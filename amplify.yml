version: 1
frontend:
    phases:
        preBuild:
            commands:
                - corepack enable
                - pnpm install --frozen-lockfile # or npm ci
        build:
            commands:
                - pnpm run export # script calls: next build && next export
    artifacts:
        baseDirectory: out # ← folder created by next export
        files:
            - "**/*"
    cache:
        paths:
            - node_modules/**/*
            - ~/.pnpm-store/**/*
