version: 1
frontend:
    phases:
        preBuild:
            commands:
                - corepack enable
                - pnpm install --frozen-lockfile # or npm ci
        build:
            commands:
                - pnpm run build # Next.js build / export
    artifacts:
        # if you used `output: 'export'`
        # baseDirectory: out
        # otherwise leave blank – Amplify handles .next for SSR
    cache:
        paths:
            - node_modules/**/*
            - ~/.pnpm-store/**/*
